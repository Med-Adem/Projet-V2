# ===========================
# DATABASE CONFIGURATION
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/oetn_portal?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=adem
spring.datasource.password=adem
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / HIBERNATE
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===========================
# JWT CONFIGURATION
# ===========================
jwt.secret=oetn_super_secret_key_2026_must_be_at_least_256_bits_long_for_hs256
jwt.expiration=86400000

# ===========================
# SERVER
# ===========================
server.port=8080

# ===========================
# FILE UPLOAD (Guides PDF)
# ===========================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads/guides
